# Netlify configuration for the Grunion RFC site.
# This is a plain static site — no build step. Netlify just serves the files as-is.

[build]
  publish = "."
  command = ""

# Let visitors reach the '78 Club page at /the-78-club (without the .html)
[[redirects]]
  from = "/the-78-club"
  to = "/the-78-club.html"
  status = 200

# Serve The MERchives at /MERchives (without the .html)
[[redirects]]
  from = "/MERchives"
  to = "/MERchives.html"
  status = 200

# Send the old /members URL to the renamed MERchives page
[[redirects]]
  from = "/members"
  to = "/MERchives.html"
  status = 301

# Pretty URLs for the History and Fossils pages (matches /the-78-club and /MERchives)
[[redirects]]
  from = "/history"
  to = "/history.html"
  status = 200

[[redirects]]
  from = "/fossils"
  to = "/fossils.html"
  status = 200

# Newsletter confirmation page (Campaign Monitor redirects here after signup)
[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200

# Site-wide security headers. Deliberately conservative: no Content-Security-Policy,
# because the Campaign Monitor archive (document.write), inline styles/handlers, and
# third-party sponsor/Google/Facebook assets would make a strict CSP break silently.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000"

# Cache images for a day. Long enough to speed up repeat visits; short enough
# that the "replace a photo with the same filename" update trick still shows
# within a day (shift-reload shows it immediately).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
